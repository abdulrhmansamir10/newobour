<!-- @dsCard group="Brand" viewport="700x220" name="Logo" subtitle="Primary shield mark — on light and on navy" -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-base); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; height: 220px; }
  .panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .light { background: var(--paper); }
  .dark { background: var(--navy-800); }
  img { height: 120px; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .word { display: flex; flex-direction: column; line-height: 1; }
  .ar { font-weight: 800; font-size: 22px; }
  .en { font-family: var(--font-num); font-weight: 600; font-size: 12px; letter-spacing: .14em; margin-top: 4px; }
  .light .ar { color: var(--navy-800); } .light .en { color: var(--gold-700); }
  .dark .ar { color: #fff; } .dark .en { color: var(--gold-400); }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel light">
      <img src="../assets/logo-mark.png" alt="NewObour">
      <div class="lockup"><div class="word"><span class="ar">العبور الجديدة</span><span class="en">NEW OBOUR CITY</span></div></div>
    </div>
    <div class="panel dark">
      <img src="../assets/logo-mark-light.png" alt="NewObour">
      <div class="lockup"><div class="word"><span class="ar">العبور الجديدة</span><span class="en">NEW OBOUR CITY</span></div></div>
    </div>
  </div>
</body>
</html>
