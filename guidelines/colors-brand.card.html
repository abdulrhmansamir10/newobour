<!-- @dsCard group="Colors" viewport="700x180" name="Brand Colors" subtitle="Deep Navy + Royal Gold — the core of the identity" -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px; }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-lg); padding: 16px; display: flex; flex-direction: column; justify-content: space-between; height: 116px; box-shadow: var(--shadow-sm); }
  .name { font-family: var(--font-base); font-weight: 700; font-size: 15px; }
  .hex { font-family: var(--font-num); font-size: 13px; letter-spacing: .02em; opacity: .85; direction: ltr; unicode-bidi: bidi-override; text-align: start; }
  .navy { background: var(--navy-800); color: #fff; }
  .navy .hex { color: var(--gold-300); }
  .gold { background: var(--gold-600); color: var(--navy-900); }
  .paper { background: var(--paper); color: var(--ink-800); border: 1px solid var(--border-subtle); }
  .graphite { background: var(--ink-800); color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw navy"><span class="name">الكحلي العميق · Deep Navy</span><span class="hex">#0B1B33</span></div>
    <div class="sw gold"><span class="name">الذهبي الملكي · Royal Gold</span><span class="hex">#C9983E</span></div>
    <div class="sw paper"><span class="name">الأبيض الهادئ · Soft White</span><span class="hex">#F7F7F5</span></div>
    <div class="sw graphite"><span class="name">الجرافيت · Graphite</span><span class="hex">#2D2D2D</span></div>
  </div>
</body>
</html>
