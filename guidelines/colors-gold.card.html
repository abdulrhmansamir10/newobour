<!-- @dsCard group="Colors" viewport="700x130" name="Gold Scale" subtitle="Accent ramp — highlights, verified badges, secondary actions" -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px; }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 88px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-num); font-size: 11px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--gold-50);color:#8a6622">50</div>
    <div class="step" style="background:var(--gold-100);color:#8a6622">100</div>
    <div class="step" style="background:var(--gold-200);color:#8a6622">200</div>
    <div class="step" style="background:var(--gold-300);color:#6e4f18">300</div>
    <div class="step" style="background:var(--gold-400);color:#6e4f18">400</div>
    <div class="step" style="background:var(--gold-500);color:#fff">500</div>
    <div class="step" style="background:var(--gold-600);color:#fff">600</div>
    <div class="step" style="background:var(--gold-700);color:#fff">700</div>
    <div class="step" style="background:var(--gold-800);color:#fff">800</div>
    <div class="step" style="background:var(--gold-900);color:#fff">900</div>
  </div>
</body>
</html>
