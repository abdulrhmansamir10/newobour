<!-- @dsCard group="Colors" viewport="700x130" name="Navy Scale" subtitle="Primary ramp — navbars, headers, primary CTAs" -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); padding: 20px; }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 88px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-num); font-size: 11px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--navy-50);color:#13294b">50</div>
    <div class="step" style="background:var(--navy-100);color:#13294b">100</div>
    <div class="step" style="background:var(--navy-200);color:#13294b">200</div>
    <div class="step" style="background:var(--navy-300);color:#0b1b33">300</div>
    <div class="step" style="background:var(--navy-400);color:#fff">400</div>
    <div class="step" style="background:var(--navy-500);color:#fff">500</div>
    <div class="step" style="background:var(--navy-600);color:#fff">600</div>
    <div class="step" style="background:var(--navy-700);color:#fff">700</div>
    <div class="step" style="background:var(--navy-800);color:#fff">800</div>
    <div class="step" style="background:var(--navy-900);color:#fff">900</div>
  </div>
</body>
</html>
