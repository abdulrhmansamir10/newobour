<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Tajawal — the full heading-to-caption ramp (RTL)" -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-surface); padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding: 7px 0; }
  .tag { font-family: var(--font-num); font-size: 11px; color: var(--text-muted); width: 96px; flex: none; }
  .s { color: var(--text-strong); font-family: var(--font-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="tag">4xl · 800</span><span class="s" style="font-size:var(--text-4xl);font-weight:800">مدينة العبور الجديدة</span></div>
  <div class="row"><span class="tag">2xl · 700</span><span class="s" style="font-size:var(--text-2xl);font-weight:700">سوق الأراضي والوحدات</span></div>
  <div class="row"><span class="tag">xl · 700</span><span class="s" style="font-size:var(--text-xl);font-weight:700">عرض قطعة أرض للبيع</span></div>
  <div class="row"><span class="tag">md · 500</span><span class="s" style="font-size:var(--text-md);font-weight:500">دليل الترخيص والبناء خطوة بخطوة</span></div>
  <div class="row"><span class="tag">base · 400</span><span class="s" style="font-size:var(--text-base);font-weight:400">منصة موثوقة لمتابعة كشوف التقنين والأخبار الرسمية للمدينة.</span></div>
  <div class="row"><span class="tag">sm · 400</span><span class="s" style="font-size:var(--text-sm);font-weight:400;color:var(--text-muted)">آخر تحديث: تم تحديث بيانات الحي الثالث قبل ٣ ساعات</span></div>
</body>
</html>
