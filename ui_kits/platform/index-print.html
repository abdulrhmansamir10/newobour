<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<title>منصة العبور الجديدة — طباعة</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body { margin: 0; background: var(--bg-app); }
  .stub { max-width: var(--container-md); margin: 0 auto; padding: 80px 36px; text-align: center; }
  .page { width: 1280px; margin: 0 auto; background: var(--bg-app); }
  .page-break { break-after: page; }
  .page-break:last-of-type { break-after: auto; }

  @page { size: 1280px 1600px; margin: 0; }

  @media print {
    .page { box-shadow: none; }
    *, *::before, *::after {
      animation-delay: -99s !important; animation-duration: .001s !important;
      animation-iteration-count: 1 !important; animation-fill-mode: both !important;
      animation-play-state: running !important; transition-duration: 0s !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="ScreensHome.jsx"></script>
<script type="text/babel" src="ScreensLedger.jsx"></script>
<script type="text/babel">
const { useEffect } = React;
const noop = () => {};

function PrintAll() {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
  return (
    <div>
      <div className="page page-break">
        <Navbar active="home" onNav={noop} />
        <HomeScreen onNav={noop} />
      </div>
      <div className="page page-break">
        <Navbar active="market" onNav={noop} />
        <MarketScreen onNav={noop} />
      </div>
      <div className="page page-break">
        <Navbar active="ledger" onNav={noop} />
        <LedgerScreen />
      </div>
      <div className="page page-break">
        <Navbar active="dashboard" onNav={noop} />
        <DashboardScreen />
        <Footer />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintAll />);
</script>
<script>
addEventListener('load', () => {
  (async () => {
    const root = document.getElementById('root');
    // wait for Babel to mount the React tree
    await new Promise((resolve) => {
      const t0 = Date.now();
      (function poll() {
        if (root && root.children.length > 0) return resolve();
        if (Date.now() - t0 > 8000) return resolve();
        setTimeout(poll, 100);
      })();
    });
    if (window.lucide) window.lucide.createIcons();
    try { await document.fonts.ready; } catch (e) {}
    const imgs = Array.from(document.images).filter((i) => !i.complete);
    await Promise.race([
      Promise.allSettled(imgs.map((i) => i.decode())),
      new Promise((r) => setTimeout(r, 8000)),
    ]);
    setTimeout(() => window.print(), 600);
  })();
});
</script>
</body>
</html>
