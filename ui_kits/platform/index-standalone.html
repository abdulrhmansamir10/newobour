<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<title>منصة العبور الجديدة</title>
<meta name="ext-resource-dependency" content="../../assets/logo-mark.png" data-resource-id="logoMark" />
<meta name="ext-resource-dependency" content="../../assets/logo-mark-light.png" data-resource-id="logoMarkLight" />
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-app); }
  .stub { max-width: var(--container-md); margin: 0 auto; padding: 80px 36px; text-align: center; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0b1b33">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0b1b33"/>
    <path d="M600 250 l130 70 v150 q0 60 -130 110 q-130 -50 -130 -110 v-150 z" fill="none" stroke="#f7f7f5" stroke-width="14"/>
    <circle cx="600" cy="430" r="46" fill="#c9983e"/>
    <path d="M520 470 q80 -70 160 0" fill="none" stroke="#c9983e" stroke-width="12" stroke-linecap="round"/>
  </svg>
</template>
<div id="root"></div>
<script type="text/babel" src="data.js"></script>
<script type="text/babel" src="Chrome-standalone.jsx"></script>
<script type="text/babel" src="ScreensHome.jsx"></script>
<script type="text/babel" src="ScreensLedger.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function Stub({ icon, title, desc }) {
  return (
    <div className="stub">
      <div style={{ width: 72, height: 72, borderRadius: 'var(--radius-lg)', background: 'var(--navy-50)', color: 'var(--navy-700)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px' }}>
        <i data-lucide={icon} style={{ width: 34, height: 34 }}></i>
      </div>
      <h1 style={{ fontSize: 28, fontWeight: 800, color: 'var(--navy-800)', margin: '0 0 10px' }}>{title}</h1>
      <p style={{ color: 'var(--text-muted)', fontSize: 16 }}>{desc}</p>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('home');
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  let screen;
  if (page === 'home') screen = <HomeScreen onNav={setPage} />;
  else if (page === 'market') screen = <MarketScreen onNav={setPage} />;
  else if (page === 'ledger') screen = <LedgerScreen />;
  else if (page === 'dashboard') screen = <DashboardScreen />;
  else if (page === 'news') screen = <Stub icon="newspaper" title="الأخبار والمعلومات" desc="قسم الأخبار الرسمية مقسمة حسب النوع — مرافق، طرق، تسليمات، ولوائح." />;
  else if (page === 'guide') screen = <Stub icon="scroll-text" title="دليل الترخيص والبناء" desc="خطوات الترخيص، إجراءات الاستلام، شركات البناء، وتكاليف البناء." />;

  return (
    <div>
      <Navbar active={page} onNav={setPage} />
      {screen}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
